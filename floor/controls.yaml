# Control-evidence register: the named-framework control catalog (E4.4).
#
# Auditors do not ask "did it file on time". They ask: which named control
# framework does each mechanism satisfy, where is the run evidence that the
# control OPERATED, and what immutable artifact seals it. This file is the
# declarative answer. It maps each Warden MECHANISM to a SPECIFIC named control
# across the frameworks an audit committee recognises, and names the EXACT
# run-log evidence (the event type the run emits + the chain head / signature
# that seals it) that proves the control operated in a given run.
#
# Same declarative spine as regimes.yaml: this is DATA. A pure renderer
# (floor/controls.py) walks an assembled packet and, per control, marks it
# OPERATED when the proving run-log event is present in THIS run, NOT-EXERCISED
# when absent, and points the evidence at the real event(s) + the chain head.
# It is a derived render: it reads the packet the examiner receives, makes no
# LLM call and no now(), and never enters the hashed run-log or gates anything.
#
# Honesty rules this file holds itself to:
#   - Every framework id is a REAL identifier in its standard (SOC 2 Trust
#     Services Criteria CC/A/PI series; ISO/IEC 27001:2022 Annex A; NIST CSF 2.0
#     functions/categories; and the cited regulation article). No id is invented.
#   - The "criterion" text paraphrases the named control's intent in one line so
#     the mapping is auditable, not a bare code. The authoritative wording lives
#     in the standard; this is a faithful, checkable summary.
#   - The mechanism named is the actual Warden component that implements the
#     control, and the evidence is the actual run-log event type that component
#     emits (warden/*.py + floor/run_floor.py log.append calls), so an auditor
#     can trace the row to the bytes in the sealed JSONL.
#
# Field reference (every control carries the same shape):
#   id           stable control identifier used in the register and the packet.
#   title        the control's human name (segregation of duties, etc.).
#   objective    one line: what risk the control addresses.
#   mechanism    the Warden component that implements the control (file-level).
#   frameworks   the named control references this mechanism satisfies. Each is a
#                {standard, ref, criterion} triple. standard is the framework name;
#                ref is the REAL control id in that framework; criterion is the
#                one-line faithful summary of that control's intent.
#   evidence:
#     run_log_events  the run-log entry "type" value(s) (warden/replay.py
#                     RunLog.append entry_type) and/or state-machine transition
#                     event(s) whose PRESENCE in the run proves the control
#                     operated. A control with any of these present in a run is
#                     OPERATED; absent, it is NOT-EXERCISED for that run.
#     packet_path     where in the assembled packet the renderer reads the proof
#                     (so the derivation is a pure packet read, never a run-log
#                     mutation). Dotted path into the packet dict.
#     seal            the immutable artifact that seals the evidence: the
#                     per-entry hash chain head (replay.chain_head) and the
#                     detached Ed25519 signature over it, so a named evidence
#                     event is bound to a tamper-evident, replay-verifiable seal.
#     exercised_when  a short human note on what makes this control OPERATE in a
#                     run (e.g. the veto only fires when a contradiction is
#                     planted), so a NOT-EXERCISED status reads honestly rather
#                     than as a failure.

controls:
  - id: SOD-01
    title: Segregation of duties on release (two-key gate)
    objective: >-
      No single human can both withhold and grant a regulated filing's release;
      two distinct privileged roles must concur before the filing leaves the room.
    mechanism: warden/release_gate.py (TwoKeyReleaseGate) + the
      AWAITING_HUMAN_SIGNOFF -> HUMAN_RELEASED edge in warden/state_machine.py
    frameworks:
      - standard: SOC 2
        ref: CC1.3
        criterion: >-
          The entity establishes structures, reporting lines, and appropriate
          authorities and responsibilities (segregation of incompatible duties).
      - standard: ISO/IEC 27001:2022
        ref: A.5.3
        criterion: >-
          Segregation of duties: conflicting duties and areas of responsibility
          are segregated to reduce unauthorised or unintentional modification.
      - standard: NIST CSF 2.0
        ref: PR.AA-05
        criterion: >-
          Access permissions, entitlements, and authorizations incorporate the
          principles of least privilege and separation of duties.
    evidence:
      run_log_events: [release_signoff, "protocol_event:human_released",
        "protocol_event:signoff_opened"]
      packet_path: release.signoffs
      seal: replay.chain_head + replay.signature
      exercised_when: >-
        Always operates on any run that reaches a release: two distinct human
        roles (head_of_ir and general_counsel) each record a release_signoff and
        the Warden admits HUMAN_RELEASED only after both keys are present.

  - id: VAL-01
    title: Cross-filing contradiction veto (consistency control)
    objective: >-
      A regulated filing cannot release while two drafters disagree on a
      load-bearing fact; the Warden blocks the signoff transition on the conflict.
    mechanism: warden/diff.py (diff_claims, UTC/alias canonicalization) gating
      the awaiting_human_signoff transition
    frameworks:
      - standard: SOC 2
        ref: PI1.2
        criterion: >-
          Processing integrity: inputs to processing are complete and accurate;
          the system prevents processing of data that fails validation.
      - standard: ISO/IEC 27001:2022
        ref: A.8.26
        criterion: >-
          Application security requirements: information processed is validated
          for accuracy and consistency before it is acted upon.
      - standard: NIST CSF 2.0
        ref: DE.AE-02
        criterion: >-
          Detected anomalies and indicators of compromise are analyzed to
          characterize the event (here, an inconsistency across filings).
    evidence:
      run_log_events: ["protocol_event:diff_blocked", diff]
      packet_path: diff.blocked_conflicts
      seal: replay.chain_head + replay.signature
      exercised_when: >-
        Operates only when a cross-filing contradiction is present: the diff
        emits diff_blocked and the Warden refuses the signoff transition until
        the fact is reconciled. A clean run (all filings already agree) records
        the GREEN diff_passed and the veto is NOT-EXERCISED.

  - id: AVL-01
    title: Exactly-once handoff under live agent kill (idempotency ledger)
    objective: >-
      A killed-and-restarted agent never double-files; a re-delivered unit of
      work is acknowledged and dropped, so each filing lands exactly once.
    mechanism: warden/ledger.py (IdempotencyLedger, read-then-act dedup guard)
    frameworks:
      - standard: SOC 2
        ref: A1.2
        criterion: >-
          Availability: the entity processes work to completion under failure;
          recovery procedures prevent loss or duplication of in-flight work.
      - standard: ISO/IEC 27001:2022
        ref: A.8.14
        criterion: >-
          Redundancy of information processing facilities: processing continues
          correctly through component failure without loss or duplication.
      - standard: NIST CSF 2.0
        ref: RC.RP-01
        criterion: >-
          The recovery portion of the incident response plan is executed to
          restore correct operation after disruption (here, an agent kill).
    evidence:
      run_log_events: [ledger, chaos]
      packet_path: chaos.ledger
      seal: replay.chain_head + replay.signature
      exercised_when: >-
        The ledger records every unit of work on every run; the DUPLICATE-DROP
        path (duplicates_dropped > 0) operates only under a chaos kill that
        forces a re-post. A clean run records ACCEPTED ledger entries with zero
        drops.

  - id: INT-01
    title: Signed, hash-chained provenance (audit-trail integrity)
    objective: >-
      The complete, ordered run record is tamper-evident and attributable: any
      edit, reorder, or omission moves the seal and invalidates the signature.
    mechanism: warden/chain.py (per-entry hash chain) + warden/signing.py
      (detached Ed25519 over the bound sha256 + chain head)
    frameworks:
      - standard: SOC 2
        ref: CC7.3
        criterion: >-
          The entity evaluates security events and maintains evidence of system
          activity sufficient to support investigation and accountability.
      - standard: ISO/IEC 27001:2022
        ref: A.8.15
        criterion: >-
          Logging: event logs recording activities are produced, kept, and
          protected from tampering and unauthorised access.
      - standard: NIST CSF 2.0
        ref: PR.DS-06
        criterion: >-
          The integrity of stored information is protected; integrity-checking
          mechanisms verify records have not been altered.
    evidence:
      run_log_events: [room]
      packet_path: replay.chain_head
      seal: replay.chain_head + replay.signature
      exercised_when: >-
        Always operates: every run seals its append-only JSONL with a per-entry
        hash chain and a detached Ed25519 signature over the chain head, so the
        whole ordered run is attestable and tamper-evident.

  - id: TML-01
    title: Statutory deadline clocks (timeliness control)
    objective: >-
      Each regime's reporting deadline is computed deterministically from the
      statutory trigger and tracked to a met/breached verdict per filing.
    mechanism: warden/clocks.py (UTC instants, business-day and holiday-aware
      arithmetic) driven from the declarative regime catalog
    frameworks:
      - standard: SOC 2
        ref: CC2.3
        criterion: >-
          The entity communicates with external parties (regulators) on matters
          affecting the system, within the timeframes its obligations require.
      - standard: ISO/IEC 27001:2022
        ref: A.5.5
        criterion: >-
          Contact with authorities: the entity maintains and meets the reporting
          obligations to relevant authorities within required timeframes.
      - standard: NIST CSF 2.0
        ref: RS.CO-02
        criterion: >-
          Incidents are reported consistent with established criteria, including
          mandated regulatory reporting timeframes.
    evidence:
      run_log_events: [clock_started, clock_stopped]
      packet_path: clocks
      seal: replay.chain_head + replay.signature
      exercised_when: >-
        Operates on every run: each in-scope regime starts a statutory clock at
        its trigger event and the clock is stopped at the filing release, with
        the deadline and met/breached verdict bound into the signed attestation.

  - id: DEC-01
    title: Reportability / materiality decision gate (decision control)
    objective: >-
      A regime that does not cross its statutory reporting threshold is driven
      to a terminal SUPPRESSED state by rule, not silently filed or dropped.
    mechanism: warden/reportability.py + warden/materiality gate (deterministic
      Python gating an LLM-supplied typed verdict; floor/run_floor.py reportability)
    frameworks:
      - standard: SOC 2
        ref: CC3.2
        criterion: >-
          The entity identifies and assesses risks (here, the duty-to-notify
          threshold) as a basis for determining how they are managed.
      - standard: ISO/IEC 27001:2022
        ref: A.5.34
        criterion: >-
          Privacy and protection of PII: the entity identifies and meets the
          applicable reporting requirements, deciding which obligations attach.
      - standard: NIST CSF 2.0
        ref: RS.MA-03
        criterion: >-
          Incidents are categorized and prioritized; the reporting decision per
          obligation is made against defined criteria.
    evidence:
      run_log_events: [reportability, determination_record, clock_stopped]
      packet_path: reportability.regimes
      seal: replay.chain_head + replay.signature
      exercised_when: >-
        Operates only on a run that runs the per-regime reportability beat: each
        regime's threshold is assessed and a below-threshold regime is gated to
        SUPPRESSED. A core run without that beat is NOT-EXERCISED for this
        control.
