# Regulation-as-config: the declarative regime catalog.
#
# Each record below is ONE statutory reporting regime. The engine (clocks,
# roster, recruit) reads this file and produces the live floor FROM the data, so
# adding a regulator is a data edit here, not a code change in warden/ or floor/.
#
# Field reference (every regime carries the same shape):
#   key            stable identifier for the regime
#   authority      the competent authority the filing goes to
#   branch         the protocol branch / correlation-id suffix (inc-NNNN:<branch>)
#   regime_label   human label rendered in the packet and used as the regime name
#   trigger_event  the statutory event the clock is anchored on, one of:
#                    "incident occurrence"        (T0)
#                    "becoming aware"             (awareness)
#                    "materiality determination"  (SEC Item 1.05 determination)
#                    "determination (recruit moment)"  (recruit-time determination)
#   clock:
#     length         the statutory window, an integer
#     unit           "hours" (calendar) or "business_days"
#     business_days  true when the count is in business days (SEC), false otherwise
#     holiday_calendar  the named holiday-calendar id a business-day clock counts
#                       against (warden.clocks.HOLIDAY_CALENDARS): "US_FEDERAL"
#                       (SEC), "UK_BANK", "DE_FEDERAL", "EU_TARGET", "BR_FEDERAL"
#                       (Brazil LGPD). A calendar (flat-hour) clock names "none". A
#                       business-day count skips THAT jurisdiction's public
#                       holidays, not US ones.
#     display_timezone  the IANA zone the regulator reads this deadline in
#                       (America/New_York for the SEC, Europe/Brussels for
#                       NIS2/DORA, Europe/London for the UK ICO). RENDER-ONLY: the
#                       stored/compared deadline stays a UTC instant; the packet
#                       derives the local wall-clock face from it at render time,
#                       so the same 72h window reads differently in Berlin than in
#                       London while remaining one true UTC instant. It NEVER
#                       enters the deadline math or the hashed run-log, so the SEC
#                       computed instant is byte-identical with or without it.
#   format_profile   the per-regime filing field skeleton id (floor/formats.py)
#   expert_profile (E5.6, the regime-expert drafter spine):
#     The real regulatory SUBSTANCE that turns a drafter from a slot-filler into a
#     regime expert. It carries the statutory STANDARD the filing must satisfy, the
#     named FACTORS the regulator actually weighs, and the common FAILURE MODES a
#     filing for this regime falls into. floor/drafter.py threads it into the
#     drafter SYSTEM prompt exactly the way format_profile is threaded, so the model
#     reasons in regime-specific terms and emits an OPTIONAL fenced rationale block.
#     It changes ONLY the human-readable prose: the [CLAIMS] block the Warden diffs
#     is attached after sanitization exactly as today and is never affected, and the
#     rationale is out-of-log, so a fresh run reproduces the sealed sha and replay
#     stays byte-identical. Faithful and concise, no invented citations. Shape:
#       statutory_standard  one or two plain sentences naming the legal test the
#                           filing must meet for this regime.
#       factors             the named elements the regulator weighs, each a short
#                           plain phrase.
#       failure_modes       the common ways a filing for this regime falls short,
#                           each a short plain phrase, so the drafter writes to avoid
#                           them.
#   start:
#     mode    "startup"       the clock starts when the floor opens (anchor below)
#             "recruit"       the clock starts at the runtime-recruit moment
#             "post_release"  the clock starts at the regulator RELEASE moment (the
#                             affected-party / Art 34 communication to data
#                             subjects, owed only on a high-risk breach). It is
#                             neither a startup nor a recruit regime.
#     anchor  for startup clocks, which timestamp anchors the clock:
#               "incident_t0"             NIS2 + DORA
#               "materiality_determination" SEC
#             for the post_release clock:
#               "release_moment"          the affected-party clock (anchored at the
#                                         regulator release, "without undue delay")
#   recruit (recruit-mode regimes only):
#     jurisdiction  the blast-radius token that triggers the recruit (e.g. "UK")
#     name_tokens   tokens matched against a peer's name/handle on /agent/peers
#   corpus_tags (E3.11, the regulation corpus + citation-accuracy spine):
#     The stable human-citation chunk ids in the regulation corpus (floor/corpus/,
#     built into floor/corpus/index.json by scripts/build_corpus.py) that GROUND
#     this regime: the real statutory passages the regime's filing draws on and an
#     examiner can trace it to. They are reference-data pointers ONLY, never gated,
#     clocked, or counted on, and never in the hashed run-log. The E5.9 retriever
#     uses them to fetch the verbatim text to inject; scripts/build_corpus.py
#     asserts every tag resolves to a real chunk, so a wrong or stale citation
#     surfaces at build time, not in front of a regulator. Each id is the exact
#     chunk id declared in the corpus source markers (e.g. NIS2-Art23(4),
#     SEC-Form8K-Item1.05(a), GDPR-Art33), preserving its citation punctuation.
#   high_risk (the affected-party / data-subject track only, E3.4):
#     The GDPR Article 34 threshold for COMMUNICATING the breach to the affected
#     INDIVIDUALS (not the supervisory authority). It attaches only when the breach
#     is "likely to result in a HIGH RISK to the rights and freedoms of natural
#     persons", a higher bar than the Art 33 reportability trigger above. The
#     qualitative CALL against this standard is an LLM judgment (floor/high_risk.py);
#     the deterministic warden/high_risk.py gate then requires the communication or
#     records it not-required. Carries the same {standard, rule} shape as
#     reportability and is present ONLY on the data_subject regime.
#   reportability:
#     standard  the statutory trigger STANDARD this regime applies to decide
#               whether the incident must be reported at all (the "duty to
#               notify" / reportability test). This is the declarative threshold
#               the per-regime reportability beat (E3.1) reads. The qualitative
#               CALL against this standard is an LLM judgment (floor/reportability.py);
#               the deterministic warden/reportability.py gate then suppresses a
#               regime BELOW its threshold or files one ABOVE it. SEC reuses the
#               SEC Item 1.05 "material" standard the SEC materiality beat already
#               applies, so the two beats stay consistent.
#     rule      a short human-readable rule label rendered in the Examiner Packet
#               when a regime is suppressed below its threshold (e.g. "not
#               reportable under NIS2 Art 23 significant-impact").
#   obligations (E3.4, cross-border obligation conflict):
#     The typed, declarative obligation attributes a regime imposes that can
#     GENUINELY conflict across jurisdictions for the same incident. The pure,
#     no-LLM warden/obligations.py detector reads these for the regimes actually in
#     scope and reports any mutually exclusive pair, then the Warden HALTS and
#     routes the decision to the human two-key gate. The detector NEVER decides
#     which law prevails (that is the SKIP-listed conflict-of-laws resolver); it
#     only detects + halts + routes. Each attribute is a small list of plain
#     lowercase tokens, declared honestly with its statutory basis:
#       discloses           data elements the regime is MANDATED to put in its
#                           notice.
#       forbids_disclosing  data elements the regime's law FORBIDS disclosing (a
#                           data-minimization / purpose-limitation duty).
#       mandates            named obligation tags the regime asserts; a tag and its
#                           declared opposite (warden.obligations.MUTUALLY_EXCLUSIVE_MANDATES)
#                           cannot both be satisfied (e.g. public_disclosure against
#                           confidentiality_hold).
#       basis               the cited statutory basis, rendered for the examiner,
#                           never gated on.
#     Omitted for a regime that declares no cross-border obligation tension.
#
# The behaviour and demo dates produced from this catalog are byte-identical to
# the prior hardcoded constants: this file is the SOURCE of those constants, not
# a change to them.
#
# controller (E3.6, GDPR Art 56 one-stop-shop routing):
#   The regulated entity's GDPR establishment data, declared honestly as DATA so
#   the pure no-LLM floor/lead_authority.py routing reads it rather than hardcoding
#   a lead authority. `main_establishment` is the member-state token (ISO-style)
#   where the controller has its main establishment in the EU, which under GDPR
#   Article 56(1) determines the LEAD supervisory authority. `name` is the
#   controller for the examiner. This NEVER gates, clocks, or blocks anything; it
#   is the input to a deterministic routing decision the packet renders.
#
# eu_supervisory_authorities (E3.6):
#   The honest, cited map of EU member state -> its data-protection supervisory
#   authority, a small set covering the controller's main establishment and the
#   member states the cross-border incident can put in scope. Each record carries:
#     member_state  the ISO-style member-state token the routing keys on (IE, DE,
#                   FR, NL).
#     authority     the supervisory authority's name (the one Art 33 notification
#                   is filed to when it is the lead, or copied through the lead when
#                   it is concerned).
#     country       the human-readable country label rendered for the examiner.
#   Under GDPR Art 56(1) the authority of the main establishment is the single LEAD
#   supervisory authority; under Art 4(22) every other in-scope member state's
#   authority is a "concerned" authority, reached THROUGH the lead under the Art 60
#   cooperation procedure, not filed to independently. The routing is a pure
#   data-driven lookup (floor/lead_authority.py); this catalog is its only source.

controller:
  name: Meridian Trust Bank N.V.
  # Main establishment in Ireland: GDPR Art 56(1) makes the Irish Data Protection
  # Commission (DPC) the lead supervisory authority for this controller's
  # cross-border processing. (A common real one-stop-shop lead for cross-border
  # financial controllers with an Irish main establishment.)
  main_establishment: IE

eu_supervisory_authorities:
  - member_state: IE
    authority: Irish Data Protection Commission (DPC)
    country: Ireland
  - member_state: DE
    authority: German Federal Commissioner for Data Protection (BfDI)
    country: Germany
  - member_state: FR
    authority: Commission Nationale de l'Informatique et des Libertes (CNIL)
    country: France
  - member_state: NL
    authority: Dutch Data Protection Authority (Autoriteit Persoonsgegevens)
    country: Netherlands

regimes:
  - key: nis2_early
    authority: national CSIRT (NIS2)
    branch: nis2-early
    regime_label: NIS2 early warning
    trigger_event: becoming aware
    clock:
      name: NIS2 early warning (24h)
      length: 24
      unit: hours
      business_days: false
      holiday_calendar: none
      display_timezone: Europe/Brussels
      # Live-mode tiered margin thresholds (E7.2), in SECONDS of remaining
      # statutory time. WARN at 6h left, CRITICAL at 1h left, on the tight 24h
      # early-warning clock. RENDER/LIVE-ONLY: read by the operator live board
      # and the escalation beat, never by the deadline math or the hashed log.
      warn_margin: 21600
      critical_margin: 3600
    format_profile: nis2_early
    start:
      mode: startup
      anchor: incident_t0
    corpus_tags: ["NIS2-Art23(4)", "NIS2-Art23(1)", "NIS2-Art23(3)", "NIS2-Recital-101"]
    expert_profile:
      statutory_standard: >-
        NIS2 Article 23(4)(a) early warning: within 24 hours of becoming aware of a
        significant incident, an essential or important entity submits an early
        warning to the CSIRT or competent authority indicating whether the incident
        is suspected to be caused by unlawful or malicious acts and whether it could
        have a cross-border impact. The early warning is a fast first signal, not the
        full assessment.
      factors:
        - whether the incident is suspected to result from an unlawful or malicious act
        - whether the incident could have a cross-border impact across member states
        - the significance threshold (severe operational disruption or financial loss, or considerable material or non-material damage to others)
        - the time of becoming aware that anchors the 24-hour clock
      failure_modes:
        - missing the 24-hour deadline by waiting for full forensic certainty
        - leaving the suspected-malicious or cross-border flag unanswered
        - padding the early warning with detail that belongs in the 72-hour notification
        - asserting a cause or attribution the facts do not yet support
    reportability:
      standard: >-
        NIS2 Article 23 significant impact: an incident is reportable when it
        has caused or is capable of causing severe operational disruption of the
        service or financial loss to the entity, or has affected or is capable of
        affecting other natural or legal persons by causing considerable material
        or non-material damage.
      rule: not reportable under NIS2 Art 23 significant-impact

  - key: nis2_full
    authority: national CSIRT (NIS2)
    branch: nis2
    regime_label: NIS2
    trigger_event: becoming aware
    clock:
      name: NIS2 full notification (72h)
      length: 72
      unit: hours
      business_days: false
      holiday_calendar: none
      display_timezone: Europe/Brussels
      # WARN at 12h left, CRITICAL at 3h left, on the 72h notification clock.
      warn_margin: 43200
      critical_margin: 10800
    format_profile: nis2_full
    start:
      mode: startup
      anchor: incident_t0
    corpus_tags: ["NIS2-Art23(4)", "NIS2-Art23(1)", "NIS2-Art23(3)", "NIS2-Recital-101"]
    expert_profile:
      statutory_standard: >-
        NIS2 Article 23(4)(b) incident notification: within 72 hours of becoming
        aware of a significant incident, the entity provides an initial assessment of
        the significant incident, including its severity and impact, and where
        available the indicators of compromise. This updates and supersedes the
        24-hour early warning with an evidenced assessment.
      factors:
        - the initial assessment of severity and impact on the service and on others
        - the indicators of compromise known so far (threat actor, affected systems)
        - confirmation of the suspected-malicious and cross-border findings from the early warning
        - the significance of the disruption to the essential or important service
      failure_modes:
        - submitting a notification with no severity or impact assessment, only a description
        - omitting indicators of compromise that are already known
        - contradicting the earlier early warning without explaining what changed
        - overstating impact beyond what the fact-record supports
    reportability:
      standard: >-
        NIS2 Article 23 significant impact: an incident is reportable when it
        has caused or is capable of causing severe operational disruption of the
        service or financial loss to the entity, or has affected or is capable of
        affecting other natural or legal persons by causing considerable material
        or non-material damage.
      rule: not reportable under NIS2 Art 23 significant-impact

  - key: dora
    authority: lead competent authority (DORA, via national NCA)
    branch: dora
    regime_label: DORA
    trigger_event: incident occurrence
    clock:
      name: DORA major-incident (72h)
      length: 72
      unit: hours
      business_days: false
      holiday_calendar: none
      display_timezone: Europe/Brussels
      # WARN at 12h left, CRITICAL at 3h left, on the 72h major-incident clock.
      warn_margin: 43200
      critical_margin: 10800
    format_profile: dora
    start:
      mode: startup
      anchor: incident_t0
    corpus_tags: ["DORA-2022/2554-Art19(1)", "DORA-2022/2554-Art19(3)", "DORA-2022/2554-Art19(4)", "DORA-RTS-2024/1772-Art1", "DORA-RTS-2024/1772-Art19"]
    expert_profile:
      statutory_standard: >-
        DORA (Regulation 2022/2554) Article 19 major ICT-related incident report:
        a financial entity reports an incident classified as MAJOR under the RTS
        2024/1772 criteria to its lead competent authority, with the initial
        notification due without undue delay and in any case within the time limits
        set by the RTS. The report is keyed to the classification criteria, not a
        free-form narrative.
      factors:
        - clients, financial counterparts, and transactions affected
        - the duration of the incident and any service downtime
        - geographical spread and the criticality of the services affected (e.g. the core banking ledger)
        - data losses and the economic impact, confined to what is evidenced
        - reputational impact where it is material
      failure_modes:
        - reporting a narrative that does not map to the RTS classification criteria
        - leaving the criticality of affected functions unstated
        - guessing economic impact or data-loss figures the fact-record does not support
        - treating a major incident as routine and under-reporting the downtime
    reportability:
      standard: >-
        DORA major incident (Regulation 2022/2554 Art 19, classified under the
        RTS 2024/1772 criteria): an ICT-related incident is reportable when it
        is MAJOR, that is, it meets the classification thresholds across clients,
        financial counterparts and transactions affected, reputational impact,
        duration and service downtime, geographical spread, data losses, the
        criticality of services affected, and economic impact.
      rule: not reportable under DORA major-incident RTS classification
    obligations:
      # DORA Art 19 routes the major-incident report to the lead competent
      # authority under a supervisory confidentiality expectation: operational
      # detail is shared with the supervisor, not broadcast to the market while the
      # incident is live. Paired with a law-enforcement / national-security hold,
      # this is the declared opposite of the SEC public-disclosure mandate below:
      # one government demands the market be told now, another demands operational
      # detail stay confidential. The Warden detects the clash and routes it to the
      # human; it never decides which prevails.
      mandates: [confidentiality_hold]
      basis: >-
        DORA (Regulation 2022/2554) Art 19 supervisory reporting to the lead
        competent authority, read with a competent-authority / law-enforcement
        confidentiality expectation on live operational detail.

  - key: sec
    authority: U.S. Securities and Exchange Commission
    branch: sec
    regime_label: SEC
    trigger_event: materiality determination
    clock:
      name: SEC 8-K (4 business days)
      length: 4
      unit: business_days
      business_days: true
      holiday_calendar: US_FEDERAL
      display_timezone: America/New_York
      # WARN at 24h left, CRITICAL at 4h left, on the SEC 4-business-day clock
      # (the window is days, so the live warn band is correspondingly wider).
      warn_margin: 86400
      critical_margin: 14400
    format_profile: sec_8k
    start:
      mode: startup
      anchor: materiality_determination
    corpus_tags: ["SEC-Form8K-Item1.05(a)", "SEC-Form8K-Item1.05(b)", "SEC-Form8K-Item1.05-Instruction1", "SEC-Form8K-Item1.05-Instruction2", "SEC-17CFR229.106(a)", "SEC-CF-CDI-104B.01"]
    expert_profile:
      statutory_standard: >-
        SEC Form 8-K Item 1.05: a registrant that has determined a cybersecurity
        incident is MATERIAL discloses, within four business days of that
        materiality determination, the material aspects of the nature, scope, and
        timing of the incident and the material impact or reasonably likely material
        impact on the registrant, including on its financial condition and results of
        operations. Materiality is judged from the reasonable investor's perspective,
        weighing quantitative and qualitative factors.
      factors:
        - the material aspects of the nature of the incident (what occurred, the threat actor, systems and data involved)
        - the material aspects of the scope (records affected, breadth across systems)
        - the material aspects of the timing (onset, discovery, current containment status)
        - the material impact or reasonably likely material impact on financial condition and results of operations
      failure_modes:
        - disclosing technical or operational detail that Item 1.05 does not require and that aids a threat actor
        - speculating about impact beyond what is reasonably likely and supported
        - omitting the material-impact element and describing only the incident
        - missing the four-business-day clock from the materiality determination
    reportability:
      standard: >-
        SEC Item 1.05 materiality: a cybersecurity incident is reportable when
        it is MATERIAL, that is, there is a substantial likelihood that a
        reasonable investor would consider it important, weighing both
        quantitative scale and qualitative factors. This is the same "material"
        standard the SEC materiality beat applies.
      rule: not reportable under SEC Item 1.05 materiality
    obligations:
      # SEC Item 1.05 forces PUBLIC disclosure of a material cybersecurity
      # incident on a 4-business-day clock, and the disclosure pushes toward fuller
      # incident detail for the reasonable investor, including the scope of the
      # data affected. Two cross-border tensions follow: (1) public_disclosure is
      # the declared opposite of the DORA / law-enforcement confidentiality_hold;
      # (2) the affected_data_scope element the SEC discloses is one the UK GDPR
      # data-minimization duty (below) forbids carrying in the supervisory notice.
      mandates: [public_disclosure]
      discloses: [affected_data_scope]
      basis: >-
        SEC Item 1.05 of Form 8-K (17 CFR 229.105), requiring public disclosure of
        a material cybersecurity incident's nature, scope, and timing within four
        business days of the materiality determination.

  - key: uk_ico
    authority: UK Information Commissioner's Office
    branch: uk
    regime_label: UK ICO
    trigger_event: becoming aware
    clock:
      name: UK ICO / GDPR personal-data breach (72h)
      length: 72
      unit: hours
      business_days: false
      holiday_calendar: none
      display_timezone: Europe/London
    format_profile: ico_art33
    start:
      mode: recruit
    recruit:
      jurisdiction: UK
      name_tokens: [uk, ico]
    corpus_tags: ["GDPR-Art33", "GDPR-Art4(12)", "GDPR-Art5(1)(c)", "GDPR-Art56(1)"]
    expert_profile:
      statutory_standard: >-
        UK GDPR Article 33 personal-data breach notification to the ICO: a personal
        data breach is notified to the supervisory authority without undue delay and,
        where feasible, not later than 72 hours after becoming aware of it, unless the
        breach is unlikely to result in a risk to the rights and freedoms of natural
        persons. The notice carries the Article 33(3) content.
      factors:
        - the nature of the breach (categories and approximate number of data subjects and records concerned)
        - the likely consequences of the breach for the affected individuals
        - the measures taken or proposed to address the breach and mitigate its effects
        - the risk to the rights and freedoms of natural persons that drives the duty
        - data minimization: the notice carries only what is necessary, not the full incident detail
      failure_modes:
        - missing the 72-hour window or failing to justify a delay
        - over-disclosing data the minimization duty (Art 5(1)(c)) keeps out of the supervisory notice
        - omitting the likely-consequences or measures-taken elements
        - reporting approximate numbers as false precision the fact-record does not support
    reportability:
      standard: >-
        UK GDPR / GDPR Article 33 risk to the rights and freedoms of natural
        persons: a personal-data breach is reportable to the supervisory
        authority unless it is UNLIKELY to result in a risk to the rights and
        freedoms of natural persons. A contained breach of encrypted or
        non-sensitive data with no realistic risk to data subjects need not be
        notified.
      rule: not reportable under UK GDPR Art 33 risk-to-rights-and-freedoms
    obligations:
      # UK GDPR data-minimization (Art 5(1)(c)) limits a supervisory breach notice
      # to the personal data adequate, relevant, and limited to what is necessary
      # for the notification's purpose. It FORBIDS carrying the fuller
      # affected_data_scope detail the SEC public disclosure pushes out. Same
      # incident, opposed content duties on the two notices: the Warden detects the
      # clash and routes the recorded decision to the human, never choosing a side.
      forbids_disclosing: [affected_data_scope]
      basis: >-
        UK GDPR Art 5(1)(c) data minimization and Art 33(3) (the notification
        carries the categories and approximate numbers, limited to what is
        necessary), forbidding fuller affected-data detail in the supervisory
        notice.

  - key: nydfs
    authority: New York State Department of Financial Services (superintendent)
    branch: nydfs
    regime_label: NYDFS 23 NYCRR 500
    trigger_event: determination (recruit moment)
    clock:
      name: NYDFS 23 NYCRR 500.17(a)(1) (72h from determination)
      length: 72
      unit: hours
      business_days: false
      holiday_calendar: none
      display_timezone: America/New_York
    format_profile: nydfs_50017
    start:
      mode: recruit
    recruit:
      jurisdiction: NY
      name_tokens: [nydfs]
    corpus_tags: ["NYDFS-23NYCRR500.17(a)", "NYDFS-23NYCRR500.01(d)"]
    expert_profile:
      statutory_standard: >-
        NYDFS 23 NYCRR 500.17(a)(1): a covered entity notifies the superintendent
        electronically, as promptly as possible but in no event later than 72 hours,
        after determining that a reportable cybersecurity event has occurred, where
        the event has a reasonable likelihood of materially harming any material part
        of normal operations or notice of it is required to be provided to another
        government or self-regulatory body.
      factors:
        - identification of the covered entity and the reporting basis under 500.17(a)(1)
        - the nature of the cybersecurity event
        - the systems and categories of information affected
        - the determination time that anchors the 72-hour clock
      failure_modes:
        - counting the 72 hours from discovery rather than from the determination
        - failing to identify the covered entity or the reporting basis
        - omitting the systems and information affected
        - treating the notice as the full investigation rather than the prompt initial notice
    reportability:
      standard: >-
        NYDFS 23 NYCRR 500.17(a) materiality: a cybersecurity event is reportable
        to the superintendent when it has a reasonable likelihood of materially
        harming any material part of the normal operations of the covered entity,
        or when notice of it is required to be provided to any other government
        body, self-regulatory agency, or supervisory body.
      rule: not reportable under NYDFS 23 NYCRR 500.17 material-harm

  # ------------------------------------------------------------------------
  # Global catalog (E3.7): real, cited breach-notification regimes spanning
  # legal families beyond the EU/US core above. Each is a recruit-mode regime:
  # its clock starts ONLY when its jurisdiction is named in the incident's blast
  # radius (the same content-driven recruit seam the UK ICO and NYDFS clocks use),
  # so the four DEFAULT scenarios, whose blast radius does not name these
  # jurisdictions, are untouched. Adding each was appending a data block here, with
  # ZERO edits to any warden/ gate or clock algorithm (the BR_FEDERAL holiday set
  # is pure data in warden.clocks.HOLIDAY_CALENDARS, not gate logic). Every clock
  # length and trigger below is the real statutory rule, cited in its standard.

  - key: india_dpdp
    authority: Data Protection Board of India (DPDP Act 2023)
    branch: india
    regime_label: India DPDP
    trigger_event: becoming aware
    clock:
      # DPDP Act 2023 s 8(6) read with the Digital Personal Data Protection Rules
      # 2025 (notified 2025-11-13), Rule 7: on becoming aware of a personal-data
      # breach the Data Fiduciary intimates the affected Data Principals and the
      # Board without delay, and gives the Board a detailed report within 72 hours
      # (extendable on written request). 72 flat calendar hours, no business-day or
      # holiday arithmetic.
      name: India DPDP detailed breach report to the Board (72h)
      length: 72
      unit: hours
      business_days: false
      holiday_calendar: none
      display_timezone: Asia/Kolkata
    format_profile: dp_breach_generic
    start:
      mode: recruit
    recruit:
      jurisdiction: IN
      name_tokens: [india]
    corpus_tags: ["India-DPDP-s8(6)", "India-DPDP-Rule7"]
    expert_profile:
      statutory_standard: >-
        India DPDP Act 2023 s 8(6) read with the DPDP Rules 2025 (Rule 7): on
        becoming aware of a personal-data breach the Data Fiduciary intimates the
        affected Data Principals and the Data Protection Board without delay, and
        gives the Board a detailed report within 72 hours (extendable on written
        request). The duty attaches to any personal-data breach without a separate
        materiality threshold.
      factors:
        - the nature, extent, and timing of the personal-data breach
        - the categories and approximate number of Data Principals and records affected
        - the likely consequences for the affected Data Principals
        - the measures taken or proposed to mitigate the breach
      failure_modes:
        - delaying the intimation to Data Principals while assessing the breach
        - missing the 72-hour detailed report to the Board, or relying on an unsought extension
        - omitting the mitigation measures or the affected-data categories
        - treating a non-materiality-thresholded regime as if a materiality screen applied
    reportability:
      standard: >-
        India DPDP Act 2023 (s 8(6)) read with DPDP Rules 2025 (Rule 7): on any
        personal-data breach a Data Fiduciary must intimate the affected Data
        Principals and the Data Protection Board; the duty attaches to a personal-
        data breach (any unauthorised processing, or accidental disclosure,
        acquisition, sharing, use, alteration, destruction, or loss of access, that
        compromises the confidentiality, integrity, or availability of personal
        data), without a separate materiality threshold.
      rule: not reportable under India DPDP Act 2023 personal-data-breach intimation

  - key: singapore_pdpa
    authority: Personal Data Protection Commission (PDPC), Singapore
    branch: singapore
    regime_label: Singapore PDPA
    trigger_event: determination (recruit moment)
    clock:
      # PDPA (as amended) s 26D read with the Personal Data Protection (Notification
      # of Data Breaches) Regulations: once an organisation assesses that a data
      # breach is NOTIFIABLE, it must notify the PDPC as soon as practicable, and in
      # any case no later than 3 CALENDAR days after making that determination. The
      # 3-day clock runs from the notifiability determination (the recruit moment
      # here), not from discovery, and counts calendar days including weekends and
      # public holidays: 72 flat calendar hours.
      name: Singapore PDPA notifiable data breach to the PDPC (3 calendar days)
      length: 72
      unit: hours
      business_days: false
      holiday_calendar: none
      display_timezone: Asia/Singapore
    format_profile: dp_breach_generic
    start:
      mode: recruit
    recruit:
      jurisdiction: SG
      name_tokens: [singapore, pdpc]
    corpus_tags: ["Singapore-PDPA-s26D", "Singapore-PDPA-s26B"]
    expert_profile:
      statutory_standard: >-
        Singapore PDPA s 26D: once an organisation assesses that a data breach is
        notifiable (it results in or is likely to result in significant harm to an
        affected individual, or is of significant scale affecting 500 or more
        individuals), it notifies the PDPC as soon as practicable and in any case no
        later than 3 calendar days after making that determination.
      factors:
        - the notifiability assessment (significant harm, or significant scale of 500 or more individuals)
        - the nature and circumstances of the data breach
        - the personal data and number of affected individuals involved
        - the steps taken or to be taken in response to the breach
      failure_modes:
        - counting the 3-day clock from discovery rather than from the notifiability determination
        - notifying the PDPC for a breach that does not meet either notifiability limb
        - omitting the affected-individual count relevant to the significant-scale limb
        - leaving the remedial steps unstated
    reportability:
      standard: >-
        Singapore PDPA s 26B notifiable data breach: a data breach is notifiable
        when it results in, or is likely to result in, significant harm to an
        affected individual, OR is of a significant scale (affecting 500 or more
        individuals). A breach below both limbs is not notifiable to the PDPC.
      rule: not reportable under Singapore PDPA s 26B notifiable-data-breach test

  - key: australia_ndb
    authority: Office of the Australian Information Commissioner (OAIC)
    branch: australia
    regime_label: Australia NDB
    trigger_event: becoming aware
    clock:
      # Privacy Act 1988 (Cth) Part IIIC, the Notifiable Data Breaches scheme
      # (s 26WK). On becoming aware of reasonable grounds to SUSPECT an eligible
      # data breach, an APP entity has up to 30 CALENDAR days to assess; on
      # reasonable grounds to BELIEVE an eligible data breach has occurred it must
      # prepare and give a statement to the OAIC and notify affected individuals as
      # soon as practicable. We model the outer 30-day assessment-and-notify window
      # as 720 flat calendar hours from awareness (calendar days, weekends and
      # public holidays included).
      name: Australia OAIC eligible data breach statement (30 calendar days)
      length: 720
      unit: hours
      business_days: false
      holiday_calendar: none
      display_timezone: Australia/Sydney
    format_profile: dp_breach_generic
    start:
      mode: recruit
    recruit:
      jurisdiction: AU
      name_tokens: [australia, oaic]
    corpus_tags: ["Australia-NDB-s26WE"]
    expert_profile:
      statutory_standard: >-
        Australia Privacy Act 1988 (Cth) Part IIIC Notifiable Data Breaches scheme:
        where an entity has reasonable grounds to believe an eligible data breach has
        occurred (unauthorised access, disclosure, or loss of personal information
        likely to result in serious harm that remedial action has not prevented), it
        prepares and gives a statement to the OAIC and notifies affected individuals
        as soon as practicable, having assessed within the outer 30-day window.
      factors:
        - whether the access, disclosure, or loss is likely to result in serious harm
        - the kinds of personal information involved and their sensitivity
        - whether remedial action has prevented the likely serious harm
        - the recommendations for steps affected individuals should take in response
      failure_modes:
        - drifting past the 30-day assessment window without forming a belief
        - notifying for a suspected breach before assessing the serious-harm limb
        - omitting the remedial-action analysis that can negate eligibility
        - failing to give affected individuals practical recommended steps
    reportability:
      standard: >-
        Australia Privacy Act 1988 (Cth) s 26WE eligible data breach: there is
        unauthorised access to or disclosure of, or loss of, personal information
        an entity holds, and a reasonable person would conclude the access,
        disclosure, or loss is likely to result in SERIOUS HARM to any of the
        individuals to whom the information relates, and the entity has not been
        able to prevent that likely serious harm by remedial action.
      rule: not reportable under Australia Privacy Act NDB serious-harm test

  - key: canada_osfi
    authority: Office of the Superintendent of Financial Institutions (OSFI), Canada
    branch: canada
    regime_label: Canada OSFI
    trigger_event: incident occurrence
    clock:
      # OSFI Technology and Cyber Security Incident Reporting advisory (in force with
      # Guideline B-13, 2024-01-01): a federally regulated financial institution must
      # report a reportable technology or cyber security incident to OSFI's
      # Technology Risk Division and its Lead Supervisor within 24 hours, or sooner
      # if possible. A flat 24 calendar hours from the incident, no business-day or
      # holiday arithmetic (the supervisor is reachable around the clock).
      name: Canada OSFI technology/cyber incident report (24h)
      length: 24
      unit: hours
      business_days: false
      holiday_calendar: none
      display_timezone: America/Toronto
    format_profile: dp_breach_generic
    start:
      mode: recruit
    recruit:
      jurisdiction: CA
      name_tokens: [canada, osfi]
    corpus_tags: ["Canada-PIPEDA-s10.1"]
    expert_profile:
      statutory_standard: >-
        OSFI Technology and Cyber Security Incident Reporting advisory (with
        Guideline B-13): a federally regulated financial institution reports a
        reportable technology or cyber security incident to OSFI's Technology Risk
        Division and its Lead Supervisor within 24 hours, or sooner if possible, where
        the incident is assessed as high or critical severity or has a material impact
        on operations.
      factors:
        - the assessed severity of the incident (high or critical) and its operational impact
        - the nature of the technology or cyber security incident
        - the systems, services, and customers affected
        - the time the incident was identified that anchors the 24-hour clock
      failure_modes:
        - missing the 24-hour supervisor notification on a high or critical incident
        - under-assessing severity to avoid the reporting trigger
        - omitting the impact on customers or critical operations
        - reporting without naming the affected systems and services
    reportability:
      standard: >-
        OSFI Technology and Cyber Security Incident Reporting advisory: a
        federally regulated financial institution must report a technology or cyber
        security incident assessed as having a HIGH or CRITICAL severity, or that
        has a material impact on the institution's operations (including
        operational, reputational, or financial impact, or impact to customers).
      rule: not reportable under OSFI technology/cyber incident severity threshold

  - key: brazil_lgpd
    authority: Autoridade Nacional de Protecao de Dados (ANPD), Brazil
    branch: brazil
    regime_label: Brazil LGPD
    trigger_event: becoming aware
    clock:
      # LGPD (Law 13.709/2018) Art 48 read with Regulation CD/ANPD 15/2024
      # (2024-04-24): the controller communicates a security incident that may
      # result in relevant risk or harm to data subjects to the ANPD and to the
      # data subjects within 3 BUSINESS days counted from awareness that the
      # incident affected personal data. This is a genuine business-day clock: it
      # skips weekends AND Brazilian national holidays via the BR_FEDERAL calendar
      # (the deliberate contrast with the calendar-hour APAC clocks above).
      name: Brazil LGPD security-incident communication to the ANPD (3 business days)
      length: 3
      unit: business_days
      business_days: true
      holiday_calendar: BR_FEDERAL
      display_timezone: America/Sao_Paulo
    format_profile: dp_breach_generic
    start:
      mode: recruit
    recruit:
      jurisdiction: BR
      name_tokens: [brazil, anpd]
    corpus_tags: ["Brazil-LGPD-Art48"]
    expert_profile:
      statutory_standard: >-
        Brazil LGPD (Law 13.709/2018) Article 48 read with Regulation CD/ANPD
        15/2024: the controller communicates a security incident that may result in
        relevant risk or harm to the data subjects to the ANPD and to the affected
        data subjects within 3 business days, counted from awareness that the incident
        affected personal data.
      factors:
        - whether the incident may result in relevant risk or harm to the data subjects
        - the nature of the affected personal data and the data subjects involved
        - the technical and security measures used to protect the data
        - the risk-mitigation measures adopted or to be adopted
      failure_modes:
        - counting calendar days rather than the LGPD business-day window
        - communicating only to the ANPD and not to the affected data subjects when required
        - omitting the protective measures or the mitigation steps
        - over-reporting an incident with no relevant risk or harm that only needs recording
    reportability:
      standard: >-
        Brazil LGPD (Law 13.709/2018) Art 48 read with Regulation CD/ANPD 15/2024:
        the controller must communicate a security incident to the ANPD and to the
        affected data subjects when the incident may result in RELEVANT RISK OR
        HARM to the data subjects. An incident that does not present relevant risk
        or harm need not be communicated, though it must still be recorded.
      rule: not reportable under Brazil LGPD Art 48 relevant-risk-or-harm test

  - key: korea_pipa
    authority: Personal Information Protection Commission (PIPC), South Korea
    branch: korea
    regime_label: South Korea PIPA
    trigger_event: becoming aware
    clock:
      # PIPA (Personal Information Protection Act) Art 34 read with its Enforcement
      # Decree: on becoming aware of a personal-information breach a controller must
      # notify the affected data subjects without delay, and report to the PIPC (or
      # KISA) within 72 hours where the breach reaches the reporting thresholds
      # (1,000+ data subjects, or sensitive / unique-identifying information, or an
      # external unauthorised-access breach). 72 flat calendar hours from awareness.
      name: South Korea PIPA breach report to the PIPC (72h)
      length: 72
      unit: hours
      business_days: false
      holiday_calendar: none
      display_timezone: Asia/Seoul
    format_profile: dp_breach_generic
    start:
      mode: recruit
    recruit:
      jurisdiction: KR
      name_tokens: [korea, pipc]
    corpus_tags: ["Korea-PIPA-Art34"]
    expert_profile:
      statutory_standard: >-
        South Korea PIPA Article 34 read with its Enforcement Decree: on becoming
        aware of a personal-information breach a controller notifies the affected data
        subjects without delay and reports to the PIPC (or KISA) within 72 hours where
        the breach reaches the reporting thresholds (1,000 or more data subjects, or
        sensitive or unique-identifying information, or an external unauthorised-access
        breach).
      factors:
        - whether the breach crosses a reporting threshold (1,000 or more subjects, sensitive or unique-identifying data, or external unauthorised access)
        - the categories and volume of personal information leaked
        - the measures that may significantly reduce the risk of harm to data subjects
        - the response and remediation already taken
      failure_modes:
        - missing the 72-hour PIPC report once a threshold is crossed
        - failing to notify the affected data subjects without delay
        - omitting the risk-reduction measures that can excuse the PIPC report
        - misjudging whether sensitive or unique-identifying information was involved
    reportability:
      standard: >-
        South Korea PIPA Art 34: a personal-information controller must report a
        breach to the PIPC (or KISA) when the personal information of 1,000 or more
        data subjects has been leaked, OR sensitive information or unique
        identifying information has been leaked, OR personal information has been
        leaked through external unauthorised access. No PIPC report is required
        where the controller can take measures that significantly reduce the risk
        of harm to the affected data subjects.
      rule: not reportable under South Korea PIPA Art 34 report threshold

  - key: data_subject
    authority: affected individuals (data subjects)
    branch: data_subject
    regime_label: Affected-party (GDPR Art 34)
    trigger_event: regulator release (without undue delay)
    clock:
      name: GDPR Art 34 communication to data subjects (without undue delay)
      length: 72
      unit: hours
      business_days: false
      holiday_calendar: none
      display_timezone: Europe/London
    format_profile: gdpr_art34
    start:
      mode: post_release
      anchor: release_moment
    corpus_tags: ["GDPR-Art34", "GDPR-Art33", "GDPR-Art4(12)"]
    expert_profile:
      statutory_standard: >-
        GDPR Article 34 communication to the data subject: when a personal-data
        breach is likely to result in a high risk to the rights and freedoms of
        natural persons, the controller communicates the breach to the affected
        individuals without undue delay, in clear and plain language, carrying at
        least the contact point, the likely consequences, and the measures taken or
        proposed, including steps the individual can take to protect themselves.
      factors:
        - the nature of the breach described in clear and plain language for the individual
        - the contact point where the individual can obtain more information
        - the likely consequences of the breach for the affected individual
        - the measures taken or proposed and the protective steps the individual can take
      failure_modes:
        - writing to the data subject in supervisory-notice jargon rather than plain language
        - omitting the practical steps the individual can take to protect themselves
        - communicating when the breach is not high risk, or failing to when it is
        - leaving out the contact point for follow-up
    high_risk:
      standard: >-
        GDPR Article 34: a personal-data breach must be communicated to the
        affected data subjects (the individuals), without undue delay, when it is
        LIKELY TO RESULT IN A HIGH RISK to the rights and freedoms of natural
        persons. This is a HIGHER bar than the Article 33 duty to notify the
        supervisory authority: a breach can be reportable to the authority yet not
        owe a communication to data subjects. High risk turns on the sensitivity
        and volume of the personal data, the ease of identifying individuals, the
        severity of the likely consequences (identity theft, fraud on exposed
        account numbers, financial loss), and whether protective measures
        (encryption, prompt containment) reduce the realistic risk to individuals.
      rule: no communication to data subjects required under GDPR Art 34 (not high risk)
